project:
  name: "my-paper"
  paper_dir: "paper"
  code_dir: "code"
  results_dir: "results"

compile:
  engine: "latexmk"
  args: ["-pdf", "-interaction=nonstopmode"]
  main_file: "paper/main.tex"

tests:
  command: "pytest"
  args: ["-x", "--tb=short"]
  smoke_test_dir: "code/tests"

review:
  max_rounds: 3
  target_score: 8.0
  stop_on_plateau: 2          # stop after N consecutive rounds with no improvement
  stop_on_fail: 2             # stop after N consecutive validation failures

git:
  tag_prefix: "review-round-"
  auto_checkpoint: true

notification:
  method: "file"              # file / feishu / telegram (V1: file only)
  # webhook_url: ""           # V2
