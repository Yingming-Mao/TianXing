project:
  name: "my-paper"
  paper_dir: "paper"
  code_dir: "code"
  results_dir: "results"
  env: ""                       # experiment runtime environment (optional)
                                # conda env name: "myenv"
                                # conda env path: "/path/to/envs/myenv"
                                # virtualenv python: "/path/to/venv/bin/python"
                                # leave empty to use current environment

compile:
  engine: "latexmk"
  args: ["-pdf", "-interaction=nonstopmode"]
  main_file: "paper/main.tex"

tests:
  enabled: false                # set to true if your project has tests; only runs when code files are modified
  command: "pytest"
  args: ["-x", "--tb=short"]
  smoke_test_dir: "code/tests"

review:
  venue: ""                   # target venue (recommended; auto-inferred if empty)
                              # AI/ML: "NeurIPS 2026", "ICML", "ICLR", "ACL", "CVPR", "AAAI"
                              # OR/Management: "Operations Research", "Management Science",
                              #   "Transportation Science", "EJOR"
                              # Energy/Power: "Applied Energy", "IEEE TSG",
                              #   "IEEE Trans. Power Systems", "Nature Energy"
                              # EE/Control: "Automatica", "IEEE TAC", "IEEE TIE"
                              # General: "Nature", "Science", "IEEE TPAMI", "KDD", "CHI"
  max_rounds: 3
  target_score: 7.0
  stop_on_plateau: 2          # stop after N consecutive rounds with no improvement
  stop_on_fail: 2             # stop after N consecutive validation failures

experiment_map:
  enabled: true                  # auto-discover and maintain paper↔code↔test↔result mappings
  auto_update: true              # re-scan and merge new entries between rounds
  file: "experiment_map.json"    # map file location (editable by user)

git:
  tag_prefix: "review-round-"
  auto_checkpoint: true

notification:
  method: "file"              # file / feishu / telegram (V1: file only)
  # webhook_url: ""           # V2
